<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — FE Global (Inspired)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/extra.css" />
</head>
<body class="bg-slate-50 text-slate-800">

  <header class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-2xl font-bold">FE Global</a>
      <nav class="hidden md:flex gap-6">
        <a href="/" class="hover:text-sky-600">Home</a>
        <a href="./programs.html" class="hover:text-sky-600">Programs</a>
      </nav>
      <div class="md:hidden"><a href="/">Home</a></div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-12">
    <h1 class="text-2xl font-bold">Contact Us</h1>
    <p class="mt-2 text-slate-600">Fill out the form and we'll get back to you.</p>

    <form id="contactForm" class="mt-6 grid gap-4 bg-white p-6 rounded shadow-sm">
      <label class="block">
        <span class="text-sm font-medium">Name</span>
        <input type="text" id="name" required class="mt-1 block w-full border rounded p-2" />
      </label>

      <label class="block">
        <span class="text-sm font-medium">Email</span>
        <input type="email" id="email" required class="mt-1 block w-full border rounded p-2" />
      </label>

      <label class="block">
        <span class="text-sm font-medium">Message</span>
        <textarea id="message" rows="6" required class="mt-1 block w-full border rounded p-2"></textarea>
      </label>

      <div class="flex items-center gap-4">
        <button type="submit" class="px-4 py-2 bg-sky-600 text-white rounded">Send</button>
        <div id="contactStatus" class="text-sm"></div>
      </div>
    </form>
  </main>

  <footer class="bg-slate-800 text-white py-6 mt-12">
    <div class="max-w-6xl mx-auto px-4 text-center">
      © <span id="year3"></span> FE Global
    </div>
  </footer>

  <script src="./js/main.js"></script>
</body>
</html>
